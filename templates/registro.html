<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pet Mach - Crear Cuenta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Crear Cuenta</h2>
            <p style="color: #666; margin-bottom: 20px;">Rellena los campos para continuar</p>
            
            <form action="/registro" method="POST">
                <input type="text" name="nombre" placeholder="Nombre Completo" required>
                <input type="number" name="edad" placeholder="Edad" required>
                <input type="text" name="telefono" placeholder="Tu número de WhatsApp" required>
                <input type="email" name="correo" placeholder="Correo electrónico" required>
                <input type="password" name="password" placeholder="Contraseña" required>
                
                <div class="opciones" style="justify-content: center; margin-top: 10px;">
                    <p style="color: #888; font-size: 12px;">Al crear una cuenta, aceptas los términos y condiciones</p>
                </div>
                
                <button type="submit" class="btn-principal">Crear cuenta</button>
            </form>
            
            <div style="margin-top: 20px; font-size: 14px;">
                ¿Ya eres miembro? <a href="{{ url_for('login') }}" style="color: #ff6b6b; text-decoration: none; font-weight: bold;">Inicia sesión</a>
            </div>
        </div>
    </div>
</body>
</html>
