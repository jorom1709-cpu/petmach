<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pet Mach - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="fondo-patitas" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0;">
    
    <div style="width: 100%; max-width: 400px; text-align: left; margin-bottom: 15px;">
        <a href="{{ url_for('index') }}" style="text-decoration: none; color: #FF4B3A; font-weight: bold; font-size: 15px; background: white; padding: 8px 15px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            &larr; Volver al inicio
        </a>
    </div>

    <div class="login-box" style="margin: 0; width: 100%; max-width: 400px; box-sizing: border-box;">
        
        <img src="https://cdn-icons-png.flaticon.com/512/194/194279.png" alt="Logo" width="80" style="display: block; margin: 0 auto;">
        <h2 style="text-align: center;">Sign In</h2>
        
        <form action="{{ url_for('login') }}" method="POST">
            <input type="email" name="correo" placeholder="Correo electrónico" required style="width: 100%; box-sizing: border-box; margin-bottom: 15px;">
            <input type="password" name="password" placeholder="Contraseña" required style="width: 100%; box-sizing: border-box; margin-bottom: 15px;">
            
            <div class="opciones" style="margin-bottom: 20px;">
                <label><input type="checkbox"> Recordarme</label>
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>
                
            <button type="submit" class="btn-principal" style="width: 100%;">Iniciar Sesión</button>
            
            <div style="margin-top: 25px; font-size: 14px; border-top: 1px solid #eee; padding-top: 15px; text-align: center;">
                ¿Aún no tienes cuenta? 
                <a href="{{ url_for('registro') }}" style="color: #ff6b6b; text-decoration: none; font-weight: bold;">Regístrate aquí</a>
            </div>
        </form>
        
    </div>

</body>
</html>
